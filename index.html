<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria</title>
    <style>
      html, body {
        background-color: #040506;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
      }
      .splash-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #040506;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .splash-logo {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #6366f1 0%, #c084fc 100%);
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        margin-bottom: 20px;
        animation: pulse 2s infinite ease-in-out;
      }
      .splash-logo svg {
        width: 40px;
        height: 40px;
        fill: white;
      }
      .splash-title {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.05em;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }
      .splash-loader {
        width: 60px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 2px;
        margin-top: 24px;
        overflow: hidden;
        position: relative;
      }
      .splash-loader-bar {
        position: absolute;
        width: 40%;
        height: 100%;
        background: linear-gradient(to right, #818cf8, #c084fc);
        border-radius: 2px;
        animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5); }
      }
      @keyframes loading {
        0% { left: -40%; }
        50% { left: 100%; }
        100% { left: 100%; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="splash-container">
        <div class="splash-logo">
          <svg viewBox="0 0 24 24">
            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
          </svg>
        </div>
        <h1 class="splash-title">Aria</h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
