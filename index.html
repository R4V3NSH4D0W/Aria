<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria</title>
    <style>
      html, body {
        background-color: #040506;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
      }
      .splash-container {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #040506;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        z-index: 9999;
      }
      .splash-logo-img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 20px;
        animation: pulse 2.5s ease-in-out infinite;
      }
      .splash-title {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.05em;
        color: #ffffff;
        margin: 0;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="splash-container">
        <img src="/app_icon_transparent.png" alt="Aria" class="splash-logo-img" />
        <h1 class="splash-title">Aria</h1>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
