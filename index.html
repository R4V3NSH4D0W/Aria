<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria</title>
    <style>
      html, body {
        background-color: #040506;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
      }
      .splash-container {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #040506;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        z-index: 9999;
      }
      .splash-logo-img {
        width: 96px;
        height: 96px;
        object-fit: contain;
        margin-bottom: 20px;
        animation: pulse 2.5s ease-in-out infinite;
      }
      .splash-title {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.05em;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }
      .splash-loader {
        width: 60px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 2px;
        margin-top: 24px;
        overflow: hidden;
        position: relative;
      }
      .splash-loader-bar {
        position: absolute;
        width: 40%;
        height: 100%;
        background: linear-gradient(to right, #818cf8, #c084fc);
        border-radius: 2px;
        animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
      @keyframes loading {
        0% { left: -40%; }
        50% { left: 100%; }
        100% { left: 100%; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="splash-container">
        <img src="/app_icon_transparent.png" alt="Aria" class="splash-logo-img" />
        <h1 class="splash-title">Aria</h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
