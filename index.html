<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aria</title>
    <style>
      html, body {
        background-color: #040506;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        user-select: none;
      }
      .splash-container {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #040506;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        z-index: 9999;
      }
      .splash-logo {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #6366f1 0%, #c084fc 100%);
        border-radius: 50%; /* Circle for disc theme */
        box-shadow: 0 10px 35px rgba(99, 102, 241, 0.4);
        margin-bottom: 20px;
      }
      .splash-logo svg {
        width: 48px;
        height: 48px;
        animation: spin 4s linear infinite;
      }
      .splash-title {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.05em;
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }
      .splash-loader {
        width: 60px;
        height: 4px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 2px;
        margin-top: 24px;
        overflow: hidden;
        position: relative;
      }
      .splash-loader-bar {
        position: absolute;
        width: 40%;
        height: 100%;
        background: linear-gradient(to right, #818cf8, #c084fc);
        border-radius: 2px;
        animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes loading {
        0% { left: -40%; }
        50% { left: 100%; }
        100% { left: 100%; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="splash-container">
        <div class="splash-logo">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none">
            <!-- Outer CD ring -->
            <circle cx="12" cy="12" r="10" stroke="currentColor" />
            <!-- Grooves -->
            <circle cx="12" cy="12" r="7.5" stroke="currentColor" stroke-dasharray="3 1.5" />
            <circle cx="12" cy="12" r="5" stroke="currentColor" />
            <!-- Center label -->
            <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none" />
            <!-- spindle hole -->
            <circle cx="12" cy="12" r="0.6" fill="#6366f1" stroke="none" />
          </svg>
        </div>
        <h1 class="splash-title">Aria</h1>
        <div class="splash-loader">
          <div class="splash-loader-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
